<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チェリー方式チェッカー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#fff8f8;
  --surface:#ffffff;
  --card:#fff0f3;
  --border:#ffd0d9;
  --accent:#d62839;
  --accent2:#5da84f;
  --ok:#22c55e;
  --text:#50242d;
  --muted:#9a6a73;
  --r:14px;
}

body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px 80px}

header{text-align:center;margin-bottom:36px}
.cherry{
  font-size:64px;
  margin-bottom:8px;
}
.tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.2em;color:var(--accent);border:1px solid var(--accent);border-radius:4px;padding:2px 8px;margin-bottom:10px}
h1{font-size:28px;font-weight:900;letter-spacing:-.02em;color:var(--text)}
.sub{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.8}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:18px;max-width:680px;margin-left:auto;margin-right:auto;box-shadow:0 4px 18px rgba(214,40,57,.08);}
.panel-title{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}

/* FORMAT */
.fmt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px}
.fmt-btn{padding:12px 4px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:.15s}
.fmt-btn:hover{border-color:var(--accent);color:var(--text)}
.fmt-btn.active{border-color:var(--accent);background:#ffe1e8;color:var(--accent)}
.fmt-sub{font-size:10px;font-weight:400;color:var(--muted);display:block;margin-top:2px}
.custom-wrap{display:none;align-items:center;gap:8px;margin-top:10px}
.custom-wrap.on{display:flex}
.custom-wrap label{font-size:12px;color:var(--muted)}
.num-input{width:68px;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit;font-size:14px;font-weight:700;outline:none}
.num-input:focus{border-color:var(--accent)}

/* INPUTS */
.field-label{font-size:11px;color:var(--muted);margin-bottom:5px;display:block}
.field-input{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:.15s}
.field-input:focus{border-color:var(--accent)}
.field-input::placeholder{color:var(--muted)}

/* PERFORMER CARDS */
#performersWrap{margin-top:16px;display:flex;flex-direction:column;gap:14px}
.perf-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.perf-header{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);background:#fff0f3}
.perf-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.perf-name-input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-family:inherit;font-size:14px;font-weight:700;outline:none;transition:.15s}
.perf-name-input:focus{border-color:var(--accent)}
.perf-name-input::placeholder{color:var(--muted);font-weight:400}
.perf-body{padding:12px 14px}

/* UNIT BLOCKS */
.teams-section-label{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.6}
.team-block{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.team-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.team-label-badge{font-size:9px;font-weight:700;letter-spacing:.1em;color:#fff;background:var(--accent2);border-radius:4px;padding:2px 6px;white-space:nowrap}
.team-name-input{flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:.15s}
.team-name-input:focus{border-color:var(--accent)}
.team-name-input::placeholder{color:var(--muted)}
.btn-del{border:none;background:transparent;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 5px;border-radius:4px;line-height:1;transition:.12s;flex-shrink:0}
.btn-del:hover{color:var(--accent)}

.mates-label{font-size:10px;color:var(--muted);margin-bottom:6px;padding-left:2px}
.mate-row{display:flex;gap:6px;margin-bottom:5px;align-items:center}
.mate-input{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:.15s}
.mate-input:focus{border-color:var(--accent)}
.mate-input::placeholder{color:var(--muted)}

.btn-add-small{border:1px dashed var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:11px;cursor:pointer;padding:5px 10px;border-radius:6px;transition:.12s;width:100%;text-align:center}
.btn-add-small:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-add-team{border:1px dashed var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;padding:8px;border-radius:7px;transition:.12s;width:100%;margin-top:4px;text-align:center}
.btn-add-team:hover{border-color:var(--accent2);color:var(--accent2)}

/* PRIMARY BTN */
.btn-primary{display:block;width:100%;padding:13px;border:none;border-radius:8px;background:linear-gradient(135deg,#ff5d73,#d62839);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px;letter-spacing:.03em;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-ghost{padding:5px 11px;border:1.5px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;transition:.15s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

/* RESULT */
.result-box{border-radius:9px;padding:14px 18px;margin-top:14px;display:none;font-size:13px;line-height:1.8}
.result-box.ok{display:block;background:#eefbf2;border:1.5px solid var(--ok);color:#1e5e2f;}
.result-box.ng{display:block;background:#fff0f2;border:1.5px solid var(--accent);color:#d62839;}
.result-box .icon{font-size:20px;margin-bottom:4px}

/* LIST */
.entry-list{list-style:none}
.entry-item{display:flex;align-items:flex-start;gap:10px;padding:13px 0;border-bottom:1px solid var(--border)}
.entry-item:last-child{border-bottom:none}
.entry-badge{flex-shrink:0;font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 7px;border-radius:4px;background:#ffe1e8;color:#d62839;margin-top:2px}
.entry-info{flex:1;min-width:0}
.entry-unit{font-weight:700;font-size:14px}
.entry-names{font-size:12px;color:var(--muted);margin-top:2px}
.entry-teams{font-size:11px;color:var(--accent2);margin-top:2px;word-break:break-all;line-height:1.6}

/* BLOCKED */
.blocked-chip{display:inline-flex;flex-direction:column;gap:2px;background:#fff0f2;border:1px solid #ffd0d9;border-radius:7px;padding:7px 12px;margin:4px 4px 4px 0;font-size:13px;vertical-align:top;color:var(--text)}
.b-name{font-weight:700;color:var(--accent)}
.b-reason{font-size:11px;color:var(--muted)}
.no-data{text-align:center;color:var(--muted);font-size:13px;padding:24px 0}
.clear-row{display:flex;justify-content:flex-end;margin-bottom:10px}

/* RULE BOX */
.rule-box{background:#fff5f6;border:1px solid #ffd0d9;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:var(--muted);line-height:1.8}
.rule-box strong{color:var(--text)}

@media(max-width:480px){.fmt-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header>
  <div class="cherry">🍒</div>
  <div class="tag">CHERRY METHOD</div>
  <h1>チェリー方式チェッカー</h1>
  <p class="sub">本名フルネームで登録し、出演可否を自動判定します。</p>
</header>

<div class="panel">
  <div class="rule-box">
    <strong>チェリー方式とは？</strong><br>
    A＋B が1組目に登録 → A が C と2組目に登録<br>
    → <strong>B と C は追加エントリー不可</strong>になります。<br>
    「すでに2つのエントリーに出演している人の相方たちは出られない」ルールです。
  </div>
</div>

<div class="panel" id="secFormat">
  <div class="panel-title">Step 1 ／ 出演形式を選択</div>
  <div class="fmt-grid">
    <button class="fmt-btn" data-n="1" onclick="selectFmt(1)">ピン<span class="fmt-sub">1人</span></button>
    <button class="fmt-btn" data-n="2" onclick="selectFmt(2)">コンビ<span class="fmt-sub">2人</span></button>
    <button class="fmt-btn" data-n="3" onclick="selectFmt(3)">トリオ<span class="fmt-sub">3人</span></button>
    <button class="fmt-btn" data-n="c" onclick="selectFmt('c')">それ以上<span class="fmt-sub">人数指定</span></button>
  </div>
  <div class="custom-wrap" id="customWrap">
    <label>出演人数：</label>
    <input type="number" class="num-input" id="customN" min="4" max="20" value="4" oninput="onCustomN()">
    <span style="font-size:13px;color:var(--muted)">人</span>
  </div>
</div>

<div class="panel" id="secEntry" style="display:none">
  <div class="panel-title">Step 2 ／ 出演者を入力</div>

  <div style="margin-bottom:16px">
    <span class="field-label">エントリー名（コンビ名・ユニット名など、任意）</span>
    <input type="text" class="field-input" id="entryName" placeholder="例：ミルクボーイ、霜降り明星、かまいたち など">
  </div>

  <div id="performersWrap"></div>

  <button class="btn-primary" onclick="doCheck()">チェック ＆ 登録</button>
  <div class="result-box" id="resultBox"></div>
</div>

<div class="panel">
  <div class="panel-title">出演不可者（チェリー方式判定）</div>
  <div id="blockedArea"></div>
</div>

<div class="panel">
  <div class="panel-title">登録済みエントリー</div>
  <div class="clear-row"><button class="btn-ghost" onclick="clearAll()">すべて削除</button></div>
  <ul class="entry-list" id="entryList"></ul>
</div>


<script>
const KEY = 'cherry3';
let entries = [];

function save(){ localStorage.setItem(KEY, JSON.stringify(entries)) }
function load(){ try{ const r=localStorage.getItem(KEY); if(r) entries=JSON.parse(r) }catch(e){ entries=[] } }

/* ===== FORMAT SELECT ===== */
let curCount = 0;
function selectFmt(v){
  document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.toggle('active', b.dataset.n==v));
  const isC = v==='c';
  document.getElementById('customWrap').classList.toggle('on', isC);
  curCount = isC ? (parseInt(document.getElementById('customN').value)||4) : Number(v);
  buildForm(curCount);
  document.getElementById('secEntry').style.display='block';
  clearResult();
}
function onCustomN(){
  curCount = parseInt(document.getElementById('customN').value)||4;
  buildForm(curCount);
}

/* ===== BUILD FORM ===== */
let _tc = 0;
function buildForm(n){
  const wrap = document.getElementById('performersWrap');
  wrap.innerHTML = '';
  _tc = 0;
  for(let i=0;i<n;i++){
    const card = document.createElement('div');
    card.className = 'perf-card';
    card.innerHTML = `
      <div class="perf-header">
        <div class="perf-num">${i+1}</div>
        <input class="perf-name-input" id="pname_${i}" type="text"
          placeholder="出演者 ${i+1}｜本名フルネーム（例：駒場孝、内海崇）">
      </div>
      <div class="perf-body">
        <div class="teams-section-label">
          ▸ 他に組んでいるユニットを入力<br>
          <span style="font-size:10px">ユニット名と相方の本名フルネームを入力してください。複数ユニットあれば「ユニットを追加」。</span>
        </div>
        <div id="tlist_${i}"></div>
        <button class="btn-add-team" onclick="addTeam(${i})">＋ ユニットを追加</button>
      </div>`;
    wrap.appendChild(card);
  }
}

function addTeam(pi){
  const tid = `T${_tc++}_P${pi}`;
  const wrap = document.getElementById(`tlist_${pi}`);
  const el = document.createElement('div');
  el.className = 'team-block';
  el.id = `tb_${tid}`;
  el.innerHTML = `
    <div class="team-row">
      <span class="team-label-badge">ユニット</span>
      <input class="team-name-input" id="tname_${tid}" type="text" placeholder="ユニット名（例：ミルクボーイ、霜降り明星）">
      <button class="btn-del" onclick="document.getElementById('tb_${tid}').remove()">×</button>
    </div>
    <div class="mates-label">相方・メンバー（本名フルネーム）</div>
    <div id="mates_${tid}"></div>
    <button class="btn-add-small" onclick="addMate('${tid}')">＋ メンバーを追加</button>`;
  wrap.appendChild(el);
  addMate(tid);
}

let _mc = 0;
function addMate(tid){
  const wrap = document.getElementById(`mates_${tid}`);
  const mid = `M${_mc++}`;
  const row = document.createElement('div');
  row.className = 'mate-row';
  row.id = `mr_${mid}`;
  row.innerHTML = `
    <input class="mate-input" type="text" placeholder="相方の本名フルネーム（例：今田耕司、東野幸治）">
    <button class="btn-del" onclick="document.getElementById('mr_${mid}').remove()">×</button>`;
  wrap.appendChild(row);
}

/* ===== COLLECT FORM ===== */
function collectForm(){
  const result = [];
  for(let i=0;i<curCount;i++){
    const name = (document.getElementById(`pname_${i}`)?.value||'').trim();
    if(!name) continue;
    const teamBlocks = [...(document.getElementById(`tlist_${i}`)?.querySelectorAll('.team-block')||[])];
    const teams = teamBlocks.map(tb=>{
      const unitName = (tb.querySelector('.team-name-input')?.value||'').trim();
      const mates = [...tb.querySelectorAll('.mate-input')]
        .map(el=>el.value.trim()).filter(Boolean);
      return {unitName, mates};
    }).filter(t=>t.unitName||t.mates.length);
    result.push({name, teams});
  }
  return result;
}

/* ========================================
   NEW CHERRY METHOD CORE LOGIC (2026 FIXED)
   ======================================== */

// すべてのエントリーと手入力ユニットから、各人の出演情報をフラットに抽出
function getAllAppearances(allEntries) {
  const apps = new Map(); // name -> [ { id, isGroup, mates: [] } ]

  function addApp(name, id, isGroup, mates) {
    if (!name) return;
    if (!apps.has(name)) apps.set(name, []);
    if (apps.get(name).some(a => a.id === id)) return;
    apps.get(name).push({ id, isGroup, mates });
  }

  allEntries.forEach(e => {
    // 1. メインのエントリー
    const entryNames = e.memberDetails.map(m => m.name).filter(Boolean);
    const isGroup = entryNames.length >= 2;
    entryNames.forEach(name => {
      const mates = entryNames.filter(n => n !== name);
      addApp(name, 'entry_' + e.id, isGroup, mates);
    });

    // 2. 各メンバーの「他に組んでいるユニット(teams)」
    e.memberDetails.forEach(md => {
      if (!md.name || !md.teams) return;
      md.teams.forEach((t, idx) => {
        const teamNames = [md.name, ...t.mates].filter(Boolean);
        if (teamNames.length >= 2) {
          const teamId = 'team_' + e.id + '_' + md.name + '_' + idx;
          teamNames.forEach(name => {
            const mates = teamNames.filter(n => n !== name);
            addApp(name, teamId, true, mates);
          });
        }
      });
    });
  });

  return apps;
}

// 登録済みデータから「出演不可者」をリアルタイム計算
function calcBlockedNames(){
  const blocked = new Map();
  const apps = getAllAppearances(entries);
  
  apps.forEach((userApps, performer)=>{
    // 2回以上出演が確定している人を対象にする
    if(userApps.length >= 2){
      // 2回出ている本人も、3回目は出られないのでブロック
      blocked.set(performer, "すでに2つの枠に出演しているため");
      
      // その人の相方（同じユニットのメンバー）を全員永久ブロック
      userApps.forEach(app=>{
        app.mates.forEach(mate=>{
          if(mate !== performer){
            blocked.set(
              mate,
              `${performer} が2回出演しているため`
            );
          }
        });
      });
    }
  });
  return blocked;
}

function checkCanEnter(newMemberDetails){
  return [];
}

/* ===== CHECK & REGISTER ===== */
function doCheck(){
  const memberDetails = collectForm();
  const validNames = memberDetails.map(m=>m.name).filter(Boolean);
  if(!validNames.length){ alert('出演者の名前を入力してください。'); return; }

  const label = (document.getElementById('entryName').value.trim())
    || validNames.join('・')
    || `エントリー${entries.length+1}`;

  const box = document.getElementById('resultBox');

  // 【出演不可者リスト方式】での即時判定
  const blocked = calcBlockedNames();
  for(const member of memberDetails){
    if(blocked.has(member.name)){
      box.className = 'result-box ng';
      box.innerHTML = `
        <div class="icon">🚫</div>
        <strong>出演できません</strong>
        <div style="border-top:1px solid #ffd0d9;margin:8px 0"></div>
        <div style="margin-bottom:8px; font-size:12px;">
          <span style="color:var(--accent); font-weight:700">• 判定NG：</span>${member.name} は ${blocked.get(member.name)}
        </div>`;
      return;
    }
  }

  // 違反がなければ正式に保存
  const newEntry = { id: Date.now()+'', label, memberDetails };
  entries.push(newEntry);
  save();

  box.className = 'result-box ok';
  box.innerHTML = `<div class="icon">🍒</div><strong>問題なし！登録しました</strong><br>
    <span style="font-size:12px;color:var(--muted)">「${label}」を登録しました。</span>`;

  setTimeout(()=>{
    document.getElementById('secEntry').style.display='none';
    document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('customWrap').classList.remove('on');
    document.getElementById('entryName').value='';
    clearResult();
    curCount=0;
    renderAll();
  }, 1800);
}

/* ===== RENDER ===== */
function fmtLabel(n){
  if(n===1)return'ピン';if(n===2)return'コンビ';if(n===3)return'トリオ';return`${n}人`;
}

function renderAll(){ renderList(); renderBlocked(); }

function renderList(){
  const el = document.getElementById('entryList');
  if(!entries.length){ el.innerHTML='<li class="no-data">まだエントリーがありません</li>'; return; }
  el.innerHTML = entries.map(e=>{
    const n = e.memberDetails.filter(m=>m.name).length;
    const names = e.memberDetails.filter(m=>m.name).map(m=>m.name).join('・');
    const teamDesc = e.memberDetails.filter(m=>m.name&&m.teams.length).map(m=>{
      return m.teams.map(t=>`${m.name}：${t.unitName||'チーム'}（${t.mates.join('、')||'—'}）`).join(' / ');
    }).join(' ｜ ');
    return `
      <li class="entry-item">
        <span class="entry-badge">${fmtLabel(n)}</span>
        <div class="entry-info">
          <div class="entry-unit">${e.label}</div>
          <div class="entry-names">${names}</div>
          ${teamDesc?`<div class="entry-teams">${teamDesc}</div>`:''}
        </div>
        <button class="btn-ghost" onclick="delEntry('${e.id}')">削除</button>
      </li>`;
  }).join('');
}

function renderBlocked(){
  const blocked = calcBlockedNames();
  const el = document.getElementById('blockedArea');
  if(!el) return;
  if(!blocked.size){
    el.innerHTML='<p style="font-size:13px;color:var(--muted)">現在、出演不可者はいません。</p>';
    return;
  }
  el.innerHTML = `
    <p style="font-size:11px;color:var(--muted);margin-bottom:10px">ルール上、これ以上の追加エントリーができない方々です。</p>
    ${[...blocked.entries()].map(([name,reason])=>`
      <div class="blocked-chip">
        <span class="b-name">🚫 ${name}</span>
        <span class="b-reason">${reason}</span>
      </div>`).join('')}`;
}

function delEntry(id){
  entries = entries.filter(e=>e.id!==id);
  save(); renderAll();
}
function clearAll(){
  if(!confirm('すべてのエントリーを削除しますか？')) return;
  entries=[]; save(); renderAll();
}
function clearResult(){
  const b=document.getElementById('resultBox');
  if(b){ b.className='result-box'; b.innerHTML=''; }
}

load(); renderAll();
</script>
</body>
</html>
