<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チェリー方式チェッカー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#fff8f8;
  --surface:#ffffff;
  --card:#fff0f3;
  --border:#ffd0d9;
  --accent:#d62839;
  --ok:#22c55e;
  --text:#50242d;
  --muted:#9a6a73;
  --r:14px;
}

body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px 80px}

header{text-align:center;margin-bottom:36px}
.cherry{font-size:64px;margin-bottom:8px}
.tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.2em;color:var(--accent);border:1px solid var(--accent);border-radius:4px;padding:2px 8px;margin-bottom:10px}
h1{font-size:28px;font-weight:900;letter-spacing:-.02em;color:var(--text)}
.sub{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.8}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:18px;max-width:680px;margin-left:auto;margin-right:auto;box-shadow:0 4px 18px rgba(214,40,57,.08)}
.panel-title{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}

/* FORMAT */
.fmt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px}
.fmt-btn{padding:12px 4px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:.15s}
.fmt-btn:hover{border-color:var(--accent);color:var(--text)}
.fmt-btn.active{border-color:var(--accent);background:#ffe1e8;color:var(--accent)}
.fmt-sub{font-size:10px;font-weight:400;color:var(--muted);display:block;margin-top:2px}
.custom-wrap{display:none;align-items:center;gap:8px;margin-top:10px}
.custom-wrap.on{display:flex}
.custom-wrap label{font-size:12px;color:var(--muted)}
.num-input{width:68px;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit;font-size:14px;font-weight:700;outline:none}
.num-input:focus{border-color:var(--accent)}

/* INPUTS */
.field-label{font-size:11px;color:var(--muted);margin-bottom:5px;display:block}
.field-input{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:.15s}
.field-input:focus{border-color:var(--accent)}
.field-input::placeholder{color:var(--muted)}

/* PERFORMER CARDS */
#performersWrap{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.perf-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.perf-header{display:flex;align-items:center;gap:10px;padding:12px 14px;flex-wrap:wrap}
.perf-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.perf-code-input{width:110px;padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-family:inherit;font-size:14px;font-weight:700;outline:none;transition:.15s}
.perf-name-input{flex:1;min-width:160px;padding:8px 12px;border:1.5px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-family:inherit;font-size:14px;font-weight:700;outline:none;transition:.15s}
.perf-code-input:focus, .perf-name-input:focus{border-color:var(--accent)}
.perf-code-input::placeholder, .perf-name-input::placeholder{color:var(--muted);font-weight:400}

/* PRIMARY BTN */
.btn-primary{display:block;width:100%;padding:13px;border:none;border-radius:8px;background:linear-gradient(135deg,#ff5d73,#d62839);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px;letter-spacing:.03em;transition:opacity .15s}
.btn-primary:hover{opacity:.88}
.btn-ghost{padding:5px 11px;border:1.5px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;transition:.15s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

/* RESULT */
.result-box{border-radius:9px;padding:14px 18px;margin-top:14px;display:none;font-size:13px;line-height:1.8}
.result-box.ok{display:block;background:#eefbf2;border:1.5px solid var(--ok);color:#1e5e2f}
.result-box.ng{display:block;background:#fff0f2;border:1.5px solid var(--accent);color:#d62839}
.result-box .icon{font-size:20px;margin-bottom:4px}

/* LIST */
.entry-list{list-style:none}
.entry-item{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--border)}
.entry-item:last-child{border-bottom:none}
.entry-badge{flex-shrink:0;font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 7px;border-radius:4px;background:#ffe1e8;color:#d62839}
.entry-info{flex:1;min-width:0}
.entry-unit{font-weight:700;font-size:14px}
.entry-names{font-size:12px;color:var(--muted);margin-top:2px}

/* BLOCKED */
.blocked-chip{display:inline-flex;flex-direction:column;gap:2px;background:#fff0f2;border:1px solid #ffd0d9;border-radius:7px;padding:7px 12px;margin:4px 4px 4px 0;font-size:13px;vertical-align:top;color:var(--text)}
.b-name{font-weight:700;color:var(--accent)}
.b-reason{font-size:11px;color:var(--muted)}
.no-data{text-align:center;color:var(--muted);font-size:13px;padding:24px 0}
.clear-row{display:flex;justify-content:flex-end;margin-bottom:10px}

@media(max-width:480px){.fmt-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header>
  <div class="cherry">🍒</div>
  <div class="tag">CHERRY METHOD</div>
  <h1>チェリー方式チェッカー</h1>
  <p class="sub">エントリーを入力していくだけで、学籍番号をベースにチェリー方式を自動判定します。</p>
</header>

<div class="panel" id="secFormat">
  <div class="panel-title">Step 1 ／ 出演形式を選択</div>
  <div class="fmt-grid">
    <button class="fmt-btn" data-n="1" onclick="selectFmt(1)">ピン<span class="fmt-sub">1人</span></button>
    <button class="fmt-btn" data-n="2" onclick="selectFmt(2)">コンビ<span class="fmt-sub">2人</span></button>
    <button class="fmt-btn" data-n="3" onclick="selectFmt(3)">トリオ<span class="fmt-sub">3人</span></button>
    <button class="fmt-btn" data-n="c" onclick="selectFmt('c')">それ以上<span class="fmt-sub">人数指定</span></button>
  </div>
  <div class="custom-wrap" id="customWrap">
    <label>出演人数：</label>
    <input type="number" class="num-input" id="customN" min="4" max="20" value="4" oninput="onCustomN()">
    <span style="font-size:13px;color:var(--muted)">人</span>
  </div>
</div>

<div class="panel" id="secEntry" style="display:none">
  <div class="panel-title">Step 2 ／ 出演者を入力</div>

  <div style="margin-bottom:16px">
    <span class="field-label">エントリー名（コンビ名・ユニット名・芸名など）</span>
    <input type="text" class="field-input" id="entryName" placeholder="例：ミルクボーイ、ななまがり など">
  </div>

  <div id="performersWrap"></div>

  <button class="btn-primary" onclick="doCheck()">チェック ＆ 登録</button>
  <div class="result-box" id="resultBox"></div>
</div>

<div class="panel">
  <div class="panel-title">出演不可者（チェリー方式判定）</div>
  <div id="blockedArea"></div>
</div>

<div class="panel">
  <div class="panel-title">登録済みエントリー</div>
  <div class="clear-row"><button class="btn-ghost" onclick="clearAll()">すべて削除</button></div>
  <ul class="entry-list" id="entryList"></ul>
</div>


<script>
const KEY = 'cherry_student_id_v3'; 
let entries = [];

function save(){ localStorage.setItem(KEY, JSON.stringify(entries)) }
function load(){ try{ const r=localStorage.getItem(KEY); if(r) entries=JSON.parse(r) }catch(e){ entries=[] } }

/* ===== FORMAT SELECT ===== */
let curCount = 0;
function selectFmt(v){
  document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.toggle('active', b.dataset.n==v));
  const isC = v==='c';
  document.getElementById('customWrap').classList.toggle('on', isC);
  curCount = isC ? (parseInt(document.getElementById('customN').value)||4) : Number(v);
  buildForm(curCount);
  document.getElementById('secEntry').style.display='block';
  clearResult();
}
function onCustomN(){
  curCount = parseInt(document.getElementById('customN').value)||4;
  buildForm(curCount);
}

/* ===== BUILD FORM ===== */
function buildForm(n){
  const wrap = document.getElementById('performersWrap');
  wrap.innerHTML = '';
  for(let i=0;i<n;i++){
    const card = document.createElement('div');
    card.className = 'perf-card';
    card.innerHTML = `
      <div class="perf-header">
        <div class="perf-num">${i+1}</div>
        <input class="perf-code-input" id="pcode_${i}" type="text" placeholder="学籍番号">
        <input class="perf-name-input" id="pname_${i}" type="text" placeholder="名前">
      </div>`;
    wrap.appendChild(card);
  }
}

/* ===== COLLECT FORM ===== */
function collectForm(){
  const result = [];
  for(let i=0; i<curCount; i++){
    const code = (document.getElementById(`pcode_${i}`)?.value||'').trim();
    const name = (document.getElementById(`pname_${i}`)?.value||'').trim();
    if(!code || !name) continue;
    result.push({ code, name });
  }
  return result;
}

/* ========================================
   CHERRY METHOD CORE LOGIC
   ======================================== */

function getAllAppearances(allEntries) {
  const apps = new Map();

  allEntries.forEach(e => {
    const entryMembers = e.memberDetails.filter(m => m.code && m.name);
    entryMembers.forEach(m => {
      if (!apps.has(m.code)) apps.set(m.code, { name: m.name, list: [] });
      
      const userObj = apps.get(m.code);
      if (userObj.list.some(a => a.id === e.id)) return;

      const mates = entryMembers.filter(o => o.code !== m.code).map(o => ({ code: o.code, name: o.name }));
      userObj.list.push({ id: e.id, mates });
    });
  });

  return apps;
}

function calcBlockedNames(){
  const blocked = new Map();
  const apps = getAllAppearances(entries);
  
  apps.forEach((userData, performerCode)=>{
    const userApps = userData.list;
    const performerName = userData.name;
    
    if(userApps.length >= 2){
      blocked.set(performerCode, {
        name: performerName,
        reason: "すでに2つの枠に出演しているため"
      });
      
      userApps.forEach(app=>{
        app.mates.forEach(mate=>{
          if(mate.code !== performerCode){
            blocked.set(mate.code, {
              name: mate.name,
              reason: `${performerName} が2回出演しているため`
            });
          }
        });
      });
    }
  });
  return blocked;
}

/* ===== CHECK & REGISTER ===== */
function doCheck(){
  const memberDetails = collectForm();
  if(!memberDetails.length){ alert('出演者の「学籍番号」と「名前」を入力してください。'); return; }

  const codes = memberDetails.map(m => m.code);
  if(new Set(codes).size !== codes.length){
    alert('同じエントリー内に同じ学籍番号が重複して入力されています。');
    return;
  }

  const validNames = memberDetails.map(m=>m.name);
  const label = (document.getElementById('entryName').value.trim())
    || validNames.join('・')
    || `エントリー${entries.length+1}`;

  const box = document.getElementById('resultBox');

  const blocked = calcBlockedNames();
  for(const member of memberDetails){
    if(blocked.has(member.code)){
      const info = blocked.get(member.code);
      box.className = 'result-box ng';
      box.innerHTML = `
        <div class="icon">🚫</div>
        <strong>出演できません</strong>
        <div style="border-top:1px solid #ffd0d9;margin:8px 0"></div>
        <div style="margin-bottom:8px; font-size:12px;">
          <span style="color:var(--accent); font-weight:700">• 判定NG：</span>${info.name} さん（${member.code}）は ${info.reason}
        </div>`;
      return;
    }
  }

  const newEntry = { id: Date.now()+'', label, memberDetails };
  entries.push(newEntry);
  save();

  box.className = 'result-box ok';
  box.innerHTML = `<div class="icon">🍒</div><strong>問題なし！登録しました</strong><br>
    <span style="font-size:12px;color:var(--muted)">「${label}」を登録しました。</span>`;

  setTimeout(()=>{
    document.getElementById('secEntry').style.display='none';
    document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('customWrap').classList.remove('on');
    document.getElementById('entryName').value='';
    clearResult();
    curCount=0;
    renderAll();
  }, 1500);
}

/* ===== RENDER ===== */
function fmtLabel(n){
  if(n===1)return'ピン';if(n===2)return'コンビ';if(n===3)return'トリオ';return`${n}人`;
}

function renderAll(){ renderList(); renderBlocked(); }

function renderList(){
  const el = document.getElementById('entryList');
  if(!entries.length){ el.innerHTML='<li class="no-data">まだエントリーがありません</li>'; return; }
  el.innerHTML = entries.map(e=>{
    const validMembers = e.memberDetails.filter(m=>m.code && m.name);
    const n = validMembers.length;
    const names = validMembers.map(m=>`${m.name} (${m.code})`).join(' ・ ');
    
    return `
      <li class="entry-item">
        <span class="entry-badge">${fmtLabel(n)}</span>
        <div class="entry-info">
          <div class="entry-unit">${e.label}</div>
          <div class="entry-names">${names}</div>
        </div>
        <button class="btn-ghost" onclick="delEntry('${e.id}')">削除</button>
      </li>`;
  }).join('');
}

function renderBlocked(){
  const blocked = calcBlockedNames();
  const el = document.getElementById('blockedArea');
  if(!el) return;
  if(!blocked.size){
    el.innerHTML='<p style="font-size:13px;color:var(--muted)">現在、出演不可者はいません。</p>';
    return;
  }
  el.innerHTML = `
    <p style="font-size:11px;color:var(--muted);margin-bottom:10px">ルール上、これ以上の追加エントリーができない方々です。</p>
    ${[...blocked.values()].map(info=>`
      <div class="blocked-chip">
        <span class="b-name">🚫 ${info.name}</span>
        <span class="b-reason">${info.reason}</span>
      </div>`).join('')}`;
}

function delEntry(id){
  entries = entries.filter(e=>e.id!==id);
  save(); renderAll();
}
function clearAll(){
  if(!confirm('すべてのエントリーを削除しますか？')) return;
  entries=[]; save(); renderAll();
}
function clearResult(){
  const b=document.getElementById('resultBox');
  if(b){ b.className='result-box'; b.innerHTML=''; }
}

load(); renderAll();
</script>
</body>
</html>
